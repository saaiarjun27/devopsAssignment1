# -----------------------------------------------------------
# GitHub Actions CI/CD Pipeline
# ACEest Fitness & Gym – Flask Application
# -----------------------------------------------------------
# Triggered on push and pull_request to main branch.
# Stages: Lint → Build & Test → Docker Image Assembly
# -----------------------------------------------------------

name: ACEest CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # -------------------------------------------------------
  # Stage 1: Build & Lint
  # -------------------------------------------------------
  build-and-lint:
    name: "Build & Lint"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Lint with flake8
        run: |
          # Stop the build on syntax errors or undefined names
          flake8 app.py --count --select=E9,F63,F7,F82 --show-source --statistics
          # Warnings (non-blocking)
          flake8 app.py --count --exit-zero --max-complexity=10 --max-line-length=120 --statistics

      - name: Verify application imports
        run: python -c "from app import app; print('✅ App imported successfully')"

  # -------------------------------------------------------
  # Stage 2: Docker Image Assembly
  # -------------------------------------------------------
  docker-build:
    name: "Docker Image Assembly"
    runs-on: ubuntu-latest
    needs: build-and-lint

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t aceest-fitness:latest .

      - name: Verify Docker image
        run: docker images aceest-fitness:latest

  # -------------------------------------------------------
  # Stage 3: Automated Testing (in container)
  # -------------------------------------------------------
  test:
    name: "Automated Testing"
    runs-on: ubuntu-latest
    needs: docker-build

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image for testing
        run: docker build -t aceest-fitness:test .

      - name: Run Pytest inside container
        run: |
          docker run --rm aceest-fitness:test \
            python -m pytest test_app.py -v --tb=short
